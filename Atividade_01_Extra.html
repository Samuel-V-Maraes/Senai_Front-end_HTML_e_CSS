<!DOCTYPE html>
<!-- Define o tipo do documento como HTML5 -->

<html lang="pt-br">
<!-- Define o idioma da página como português do Brasil -->

<head>
    <meta charset="UTF-8">
    <!-- Define a codificação de caracteres (permite acentos corretamente) -->

    <title>Login</title>
    <!-- Título da página (aparece na aba do navegador) -->

    <link rel="stylesheet" href="css/style.css">
    <!-- Importa o arquivo CSS externo para estilização -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Importa os ícones do Bootstrap Icons via CDN -->
</head>

<body>
<!-- Corpo da página -->

<div class="container">
    <!-- Container principal que envolve todo o conteúdo -->

    <div class="login-box">
        <!-- Caixa de login -->

        <span class="close">✖</span>
        <!-- Botão de fechar (apenas visual, não tem funcionalidade ainda) -->

        <h2>Member Sign In</h2>
        <!-- Título principal -->

        <p class="subtitle">
            Not a member yet? 
            <a href="#">Sign up now</a>
        </p>
        <!-- Texto com link para cadastro -->

        <div class="input-group">
            <!-- Grupo de input (campo de usuário/email) -->

            <span class="input-group-text">
                <i class="bi bi-person-fill"></i>
            </span>
            <!-- Ícone de usuário -->

            <input type="text" class="form-control" placeholder="Username / Email">
            <!-- Campo de texto para usuário ou email -->
        </div>

        <div class="input-group">
            <!-- Grupo de input (campo de senha) -->

            <span class="input-group-text">
                <i class="bi bi-lock-fill"></i>
            </span>
            <!-- Ícone de cadeado -->

            <input type="password" placeholder="Password">
            <!-- Campo de senha -->

            <span class="input-group-text">
                <i class="bi bi-eye-slash"></i>
            </span>
            <!-- Ícone de mostrar/ocultar senha (sem funcionalidade ainda) -->
        </div>

        <div class="actions">
            <!-- Área de ações (botão + opções) -->

            <button>Sign In</button>
            <!-- Botão de login -->

            <div class="options">
                <!-- Opções adicionais -->

                <label>
                    <input type="checkbox"> Remember me
                </label>
                <!-- Checkbox para lembrar login -->

                <a href="#">Forgot Password?</a>
                <!-- Link para recuperação de senha -->
            </div>
        </div>
    </div>

    <p class="footer">designed by freepik.com</p>
    <!-- Rodapé com crédito -->
</div>

</body>
</html>
