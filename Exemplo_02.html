<!DOCTYPE html>

<title>Tabela Child-Pugh</title>

<body>

<h2>Exemplo 02 – Tabela</h2>
<h3>Classificação de Child-Pugh</h3>

<table>
<thead>
<tr>
<th>Critérios</th>
<th>1 ponto</th>
<th>2 pontos</th>
<th>3 pontos</th>
</tr>
</thead>

<tbody>
<tr>
<td><strong>Encefalopatia</strong></td>
<td>Ausente</td>
<td>Graus I e II</td>
<td>Graus III e IV</td>
</tr>

<tr>
<td><strong>Ascite</strong></td>
<td>Ausente</td>
<td>Pequena</td>
<td>Volumosa</td>
</tr>

<tr>
<td><strong>INR (RNI)</strong></td>
<td>&lt; 1,7</td>
<td>1,7 - 2,3</td>
<td>&gt; 2,3</td>
</tr>

<tr>
<td><strong>Bilirrubina total</strong></td>
<td>&lt; 2</td>
<td>2 - 3</td>
<td>&gt; 3</td>
</tr>

<tr>
<td><strong>Albumina</strong></td>
<td>&gt; 3,5</td>
<td>2,8 - 3,5</td>
<td>&lt; 2,8</td>
</tr>

</tbody>
</table>

</body>
