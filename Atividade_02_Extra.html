<!DOCTYPE html>
<!-- Define o documento como HTML5 -->

<html lang="pt-br">
<!-- Define o idioma como português do Brasil -->

<head>
  <meta charset="UTF-8">
  <!-- Permite acentuação correta -->

  <title>Login</title>
  <!-- Título da aba -->

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Importa o CSS do Bootstrap (layout, grid, componentes prontos) -->

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Importa biblioteca de ícones -->

  <!-- CSS -->
  <link rel="stylesheet" href="css/style2.css">
  <!-- Seu CSS personalizado -->
</head>

<body>
<!-- Corpo da página -->

<div class="container d-flex justify-content-center align-items-center vh-100">
  <!-- 
    container: largura padrão Bootstrap
    d-flex: ativa Flexbox
    justify-content-center: centraliza horizontalmente
    align-items-center: centraliza verticalmente
    vh-100: ocupa 100% da altura da tela
  -->
  
  <div class="login-card">
    <!-- Card principal de login (estilizado no CSS) -->

    <!-- Header -->
    <div class="login-header text-center">
      <!-- text-center: centraliza conteúdo -->

      <i class="bi bi-lock-fill"></i>
      <!-- Ícone de cadeado -->

      <h2>LOGIN</h2>
      <!-- Título -->
    </div>

    <!-- Corpo do formulário -->
    <div class="login-body">

      <form>
        <!-- Formulário de login -->

        <div class="mb-3">
          <!-- mb-3 = margin-bottom (espaçamento) -->

          <label class="form-label">E-mail address</label>
          <!-- Label do campo -->

          <input type="email" class="form-control" placeholder="mail@address.com">
          <!-- 
            form-control: estilo padrão do Bootstrap
            type=email: validação automática de email
          -->
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>

          <input type="password" class="form-control" placeholder="******">
          <!-- Campo de senha -->
        </div>

        <div class="form-check mb-3">
          <!-- Grupo de checkbox -->

          <input class="form-check-input custom-check" type="checkbox">
          <!-- Checkbox -->

          <label class="form-check-label">
            Keep me logged in
          </label>
          <!-- Texto do checkbox -->
        </div>

        <button class="btn btn-login w-100">
          SIGN IN
        </button>
        <!-- 
          btn: estilo base Bootstrap
          btn-login: estilo personalizado
          w-100: largura total
        -->

        <div class="text-center mt-3">
          <!-- Centraliza + margem superior -->
                
          <small>
            Forgot Password? 
            <a href="#">Click Here</a>
          </small>
          <!-- Link de recuperação -->
        </div>

      </form>
    </div>

  </div>

</div>

</body>
</html>
