<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>CSS e HTML - Trabalhando com login</title>
<link rel="stylesheet" href="css/style2.css">
</head>
<body>

<div class="login-box">

<h1>Login</h1>
<hr>

<label>Seu e-mail</label>
<input type="email" placeholder="contato@html5csspro.com">

<label>Sua senha</label>
<input type="password" placeholder="1234">

<div class="check">
    <label>
        Manter-me logado <input type="checkbox">
    </label>
</div>

<button>Logar</button>

<div class="footer">
Ainda não tem conta?
<a href="#">Cadastre-se</a>
</div>

</div>

</body>
</html>
