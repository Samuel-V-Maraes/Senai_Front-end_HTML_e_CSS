<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/style4.css">
</head>
<body>

<div class="bg">

  <!-- CONTAINER COM IMAGEM -->
  <div class="container-img">

    <!-- FORM POR CIMA -->
    <div class="form-box">

      <div class="row g-3">

        <div class="col-6">
          <label>Account Type</label>
          <input class="input" value="Classic Business">
        </div>

        <div class="col-6">
          <label>Full Name</label>
          <input class="input" placeholder="John M. Smith">
        </div>

        <div class="col-6">
          <label>Email Address</label>
          <input class="input" placeholder="Your Email Address">
        </div>

        <div class="col-6">
          <label>Username</label>
          <input class="input" placeholder="@example123">
        </div>

        <div class="col-6">
          <label>Phone Number</label>
          <input class="input" placeholder="123 456 789">
        </div>

        <div class="col-6">
          <label>Date of Birth</label>
          <input class="input" placeholder="Day / Month / Year">
        </div>

        <div class="col-6">
          <label>Password</label>
          <input type="password" class="input">
        </div>

        <div class="col-6">
          <label>Confirm Password</label>
          <input type="password" class="input">
        </div>

      </div>

      <div class="bottom">
        <label><input type="checkbox"> Agree with Terms of Use</label>
        <button>Save & Next</button>
      </div>

    </div>

  </div>

</div>

</body>
</html>
