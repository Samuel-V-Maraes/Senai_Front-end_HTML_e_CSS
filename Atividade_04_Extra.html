<!DOCTYPE html>
<html lang="pt br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Signup</title>

  <!-- Fonte do Google -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS externo -->
  <link rel="stylesheet" href="css/extra4.css">
</head>
<body>

<!-- CARD PRINCIPAL -->
<div class="page-card">

  <!-- NAVBAR -->
  <nav>
    <div class="logo">👑</div>

    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
      <li><a href="#">Pricing</a></li>
      <li><a href="#" class="active">Signup</a></li>
    </ul>

    <button class="live-chat-btn">Live Chat</button>
  </nav>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="body-wrap">

    <!-- LADO ESQUERDO -->
    <div class="left-panel">

      <div>
        <h1>User <span>Signup</span></h1>

        <p class="lead">
          Texto descritivo explicando o sistema ou benefícios.
        </p>

        <!-- LISTA DE BENEFÍCIOS -->
        <ul class="feature-list">
          <li>
            <span class="check-icon green"></span>
            <span>Benefício 1</span>
          </li>
          <li>
            <span class="check-icon yellow"></span>
            <span>Benefício 2</span>
          </li>
        </ul>
      </div>

      <!-- ILUSTRAÇÃO -->
      <div class="laptop-wrap">
        <div class="laptop">
          <div class="laptop-body">
            <div class="laptop-screen">
              <div class="avatar-icon">
                <div class="avatar-circle">
                  <div class="avatar-head"></div>
                  <div class="avatar-body"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="laptop-base"></div>
        </div>
      </div>

    </div>

    <!-- LADO DIREITO (FORMULÁRIO) -->
    <div class="right-panel">
      <div class="form-card">

        <div class="form-grid">

          <!-- TIPO DE CONTA -->
          <div class="field-group">
            <label>Account Type</label>
            <div class="select-wrap">
              <select>
                <option>Classic Business</option>
                <option>Personal</option>
                <option>Enterprise</option>
              </select>
            </div>
          </div>

          <!-- NOME -->
          <div class="field-group">
            <label>Full Name</label>
            <input type="text" placeholder="John M. Smith">
          </div>

          <!-- EMAIL -->
          <div class="field-group">
            <label>Email Address</label>
            <input type="email" placeholder="Your Email Address">
          </div>

          <!-- USERNAME -->
          <div class="field-group">
            <label>Username</label>
            <input type="text" placeholder="@example123">
          </div>

          <!-- TELEFONE -->
          <div class="field-group">
            <label>Phone Number</label>
            <div class="phone-wrap">
              <div class="phone-flag">
                <div class="flag-circle"></div>
                <span>123</span>
              </div>
              <input type="tel" placeholder="1234 5678 9101">
            </div>
          </div>

          <!-- DATA DE NASCIMENTO -->
          <div class="field-group">
            <label>Date of Birth</label>
            <div class="dob-row">
              <select><option>Day</option></select>
              <select><option>Month</option></select>
              <select><option>Year</option></select>
            </div>
          </div>

          <!-- SENHA -->
          <div class="field-group">
            <label>Password</label>
            <div class="pass-wrap">
              <input type="password" id="pwd1">
              <button onclick="togglePass('pwd1', this)" type="button">👁</button>
            </div>
          </div>

          <!-- CONFIRMAR SENHA -->
          <div class="field-group">
            <label>Confirm Password</label>
            <div class="pass-wrap">
              <input type="password" id="pwd2">
              <button onclick="togglePass('pwd2', this)" type="button">👁</button>
            </div>
          </div>

        </div>

        <!-- TERMOS + BOTÃO -->
        <div class="form-bottom">
          <div class="terms-row">
            <input type="checkbox" checked>
            <label>Agree with Terms</label>
          </div>

          <button class="btn-submit">Save & Next</button>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- SCRIPT -->
<script>
function togglePass(id, btn) {
  const input = document.getElementById(id);

  if (input.type === 'password') {
    input.type = 'text';
  } else {
    input.type = 'password';
  }
}
</script>

</body>
</html>
